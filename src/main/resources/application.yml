spring:
  application:
    name: pos-api
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  flyway:
    enabled: ${SPRING_FLYWAY_ENABLED:false}
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: false

  jackson:
    serialization:
      write-dates-as-timestamps: false

server:
  port: ${PORT:8080}

app:
  env: ${APP_ENV:dev}
