spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/bipos}
    username: ${SPRING_DATASOURCE_USERNAME:bipos_user}
    password: ${SPRING_DATASOURCE_PASSWORD:Bipos@123}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: public

do:
  spaces:
    bucket: ${DO_SPACES_BUCKET:bipos-dev}
    region: ${DO_SPACES_REGION:nyc3}
    access-key: ${DO_SPACES_ACCESS_KEY:dummy}
    secret-key: ${DO_SPACES_SECRET_KEY:dummy}

pos:
  resources:
    cache:
      cachecontrol:
        no-cache: true

security:
  jwt:
    pos:
      secret: ${JWT_SECRET_POS:gx7ow6V8/zS3n53u540FcFsFGTGpVz85Y1dXDFNLMDyZsFEQMKvgL4pHMEV9is2zm++BXV/QYppVZ3DZLYBugw==}
      expiration: ${JWT_EXPIRATION_POS:900000}

server:
  port: ${PORT:8080}

app:
  env: dev

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
